# Render blueprint — describes the Web Service for ai-food-backend.
#
# The database lives on Supabase (free tier, no time-based expiry, with
# pgvector available). Render Postgres was retired after the free-tier
# 90-day clock ran out.

services:
  - type: web
    name: ai-food-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    # --omit=optional skips @xenova/transformers and its 80MB+
    # onnxruntime native binary, which doesn't fit comfortably in the
    # free tier's 512MB build RAM. The chat service falls back to
    # filter-only ranking when the local provider isn't available.
    # For full semantic search, run on a paid plan or set
    # EMBEDDINGS_PROVIDER=openai.
    buildCommand: npm install --omit=optional && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL points at Supabase. Managed in the Render dashboard
      # rather than committed here so the Supabase password doesn't end
      # up in source. sync:false tells Render to leave whatever was set
      # in the dashboard alone.
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET also lives in the dashboard. Was generated once via
      # `node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"`
      # and stored there. Don't rotate without re-issuing all JWTs.
      - key: JWT_SECRET
        sync: false
      - key: EMBEDDINGS_PROVIDER
        value: local
      # Update CORS_ORIGINS in the dashboard if the frontend URL changes.
      - key: CORS_ORIGINS
        sync: false
