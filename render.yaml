# Render blueprint — describes the Web Service for ai-food-backend.
#
# The database lives on Supabase (free tier, no time-based expiry, with
# pgvector available). Render Postgres was retired after the free-tier
# 90-day clock ran out.

services:
  - type: web
    name: ai-food-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    # --omit=optional skips @xenova/transformers and its 80MB+
    # onnxruntime native binary, which doesn't fit comfortably in the
    # free tier's 512MB build RAM. The chat service falls back to
    # filter-only ranking when the local provider isn't available.
    # For full semantic search, run on a paid plan or set
    # EMBEDDINGS_PROVIDER=openai.
    buildCommand: npm install --omit=optional && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: EMBEDDINGS_PROVIDER
        value: local
      # All sensitive secrets live in the dashboard with sync:false so
      # the actual values never appear in source. See SECURITY.md for
      # the rotation procedure for each.
      - key: DATABASE_URL
        sync: false        # Supabase Session pooler connection string
      - key: JWT_SECRET
        sync: false        # 32 random bytes, base64
      - key: CORS_ORIGINS
        sync: false        # comma-separated allowed origins
      - key: GROQ_API_KEY
        sync: false        # for LLM filter extraction; falls back to regex if missing
      - key: TOKEN_ENCRYPTION_KEY
        sync: false        # 32 random bytes, base64; encrypts Swiggy access tokens at rest
      # Optional overrides — defaults are baked into the code
      - key: SWIGGY_REDIRECT_URI
        sync: false        # defaults to the prod URL on Render
      - key: FRONTEND_BASE_URL
        sync: false        # defaults to khanadedo.vercel.app in prod
